[program:queue-redis]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/html/artisan queue:work redis --
queue=default,emails,payments --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
numprocs=2
stopasgroup=true
killasgroup=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:queue-database]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/html/artisan queue:work database --queue=default --
sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
numprocs=1
stopasgroup=true
killasgroup=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:laravel-scheduler]
command=php /var/www/html/artisan schedule:work
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true
