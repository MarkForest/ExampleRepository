services:
  php:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    container_name: finance_app
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis
    working_dir: /var/www/html

  queue-worker:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    container_name: queue-worker
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/supervisor/queue-worker.conf:/etc/supervisor/conf.d/queue-worker.conf:ro
    command: ["supervisord", "-n", "-c", "/etc/supervisor/supervisord.conf"]

    restart: unless-stopped
    depends_on:
      - php
      - redis
      - mysql

  mysql:
    image: mysql:8.0
    container_name: finance_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: finance_db
      MYSQL_USER: finance_user
      MYSQL_PASSWORD: finance_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: php_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  adminer:
    image: adminer
    container_name: finance_adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - mysql

volumes:
  db_data:
  redis_data:
